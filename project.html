<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>habits/ — Claude Code</title>
<style>
  :root {
    --bg: #0e0f12;
    --bg-2: #15171c;
    --bg-3: #1c1f26;
    --bg-4: #232730;
    --line: #262a33;
    --line-2: #333845;
    --fg: #e6e7ea;
    --fg-dim: #9097a3;
    --fg-mute: #5b6272;
    --accent: #d97757;
    --accent-soft: #d9775722;
    --green: #5fb87a;
    --red: #e26a6a;
    --yellow: #d6b14a;
    --blue: #6b9fff;
    --purple: #a78bfa;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg); color: var(--fg);
    font-family: var(--sans); font-size: 14px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    height: 100vh; overflow: hidden;
  }

  /* header */
  header {
    border-bottom: 1px solid var(--line);
    padding: 10px 20px;
    display: flex; align-items: center; gap: 12px;
    background: var(--bg-2);
  }
  .logo { width: 22px; height: 22px; border-radius: 5px; background: var(--accent); display: grid; place-items: center; color: #fff; font-weight: 700; font-size: 13px; }
  .title { font-weight: 600; }
  .crumb { color: var(--fg-dim); font-size: 12px; }
  .crumb b { color: var(--fg); }
  .spacer { flex: 1; }
  .pill { font-size: 11px; padding: 3px 8px; border-radius: 999px; background: var(--bg-3); color: var(--fg-dim); border: 1px solid var(--line); }
  .pill.green { color: var(--green); border-color: #2c4a36; background: #16241c; }
  .pill.red   { color: var(--red);   border-color: #4a2c2c; background: #241616; }
  .pill.live::before {
    content: ""; display: inline-block; width: 6px; height: 6px;
    background: var(--green); border-radius: 50%; margin-right: 6px;
    animation: pulse 1.6s infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 #5fb87a88; }
    70%  { box-shadow: 0 0 0 8px #5fb87a00; }
    100% { box-shadow: 0 0 0 0 #5fb87a00; }
  }

  main { overflow-y: auto; padding: 24px 20px 60px; scroll-behavior: smooth; }
  .stream { max-width: 920px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; }

  /* day divider */
  .day-divider {
    margin: 18px 0 4px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 14px;
    animation: day-in 520ms cubic-bezier(.2,.8,.2,1) both;
  }
  @keyframes day-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .day-divider::before, .day-divider::after {
    content: ""; height: 1px; background: linear-gradient(to right, transparent, var(--line));
  }
  .day-divider::after { background: linear-gradient(to left, transparent, var(--line)); }
  .day-pill {
    background: var(--bg-2);
    border: 1px solid var(--line-2);
    border-radius: 999px;
    padding: 6px 14px;
    display: inline-flex; align-items: center; gap: 10px;
    font-size: 12px;
  }
  .day-pill .num {
    font-family: var(--mono); font-size: 11px;
    color: var(--accent); background: var(--accent-soft);
    padding: 1px 6px; border-radius: 4px;
  }
  .day-pill .date { color: var(--fg-dim); }
  .day-pill .label { font-weight: 600; }

  /* hero (the project description card) */
  .hero {
    display: flex; gap: 18px; align-items: flex-start;
    padding: 6px 4px 4px;
    animation: hero-in 600ms cubic-bezier(.2,.8,.2,1) both;
  }
  @keyframes hero-in {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .hero-icon {
    width: 64px; height: 64px; border-radius: 14px;
    background: linear-gradient(135deg, var(--accent), #b85a3e);
    display: grid; place-items: center;
    font-size: 30px; color: #fff; flex-shrink: 0;
    box-shadow: 0 6px 20px #d9775744;
  }
  .hero h1 { margin: 0 0 4px; font-size: 22px; }
  .hero .desc { color: var(--fg-dim); line-height: 1.5; max-width: 720px; font-size: 13.5px; }
  .hero .stack { display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap; }
  .hero .stack .tag {
    font-family: var(--mono); font-size: 10.5px;
    padding: 2px 7px; border-radius: 4px;
    background: var(--bg-3); color: var(--fg-dim);
    border: 1px solid var(--line);
  }

  /* component (same style as session view) */
  .component {
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 200ms ease, box-shadow 200ms ease;
    animation: component-in 520ms cubic-bezier(.2,.8,.2,1) both;
    will-change: transform, opacity;
  }
  .component:hover { border-color: var(--line-2); }
  .component.referenced {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  @keyframes component-in {
    0%   { opacity: 0; transform: translateY(14px) scale(.985); filter: blur(2px); }
    60%  { opacity: 1; filter: blur(0); }
    100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
  }
  .c-head {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; border-bottom: 1px solid var(--line);
    background: linear-gradient(to bottom, var(--bg-3), var(--bg-2));
    font-size: 12px; color: var(--fg-dim);
  }
  .c-head .icon { font-size: 14px; }
  .c-head .kind {
    font-family: var(--mono); font-size: 10.5px; padding: 1px 6px;
    border-radius: 3px; background: var(--bg-4); color: var(--fg-dim);
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .c-head .name { color: var(--fg); font-weight: 500; }
  .c-head .meta { margin-left: auto; color: var(--fg-mute); font-size: 11px; font-family: var(--mono); }

  /* cascade utility */
  .cascade > * { opacity: 0; transform: translateY(4px); animation: cascade-in 380ms cubic-bezier(.2,.8,.2,1) forwards; }
  .cascade > *:nth-child(1)  { animation-delay:  60ms; }
  .cascade > *:nth-child(2)  { animation-delay: 110ms; }
  .cascade > *:nth-child(3)  { animation-delay: 160ms; }
  .cascade > *:nth-child(4)  { animation-delay: 210ms; }
  .cascade > *:nth-child(5)  { animation-delay: 260ms; }
  .cascade > *:nth-child(6)  { animation-delay: 310ms; }
  .cascade > *:nth-child(7)  { animation-delay: 360ms; }
  .cascade > *:nth-child(8)  { animation-delay: 410ms; }
  .cascade > *:nth-child(n+9) { animation-delay: 460ms; }
  @keyframes cascade-in { to { opacity: 1; transform: translateY(0); } }

  /* session card (an inline replay of a past session — clickable to "open it") */
  .session-card {
    display: grid;
    grid-template-columns: 6px 1fr auto;
    cursor: pointer;
    transition: background 160ms ease;
  }
  .session-card:hover { background: var(--bg-3); }
  .session-card .stripe { background: var(--green); }
  .session-card.fail .stripe { background: var(--red); }
  .session-card.wip  .stripe { background: var(--yellow); }
  .session-card .body { padding: 10px 14px; }
  .session-card .title { font-weight: 500; }
  .session-card .summary { color: var(--fg-dim); font-size: 12.5px; margin-top: 3px; line-height: 1.45; }
  .session-card .chips { margin-top: 6px; display: flex; gap: 5px; flex-wrap: wrap; }
  .session-card .chip { font-size: 10.5px; padding: 1px 6px; border-radius: 3px; background: var(--bg-3); color: var(--fg-dim); font-family: var(--mono); }
  .session-card .chip.accent { background: var(--accent-soft); color: var(--accent); }
  .session-card .pad { padding: 10px 14px 10px 0; text-align: right; color: var(--fg-mute); font-size: 11px; align-self: center; }

  /* needs-attention row */
  .row-item {
    display: grid; grid-template-columns: 30px 1fr auto;
    gap: 12px; align-items: center;
    padding: 10px 14px; cursor: pointer;
    transition: background 160ms ease, transform 160ms ease;
  }
  .row-item:hover { background: var(--bg-3); }
  .row-item:hover .cta { opacity: 1; transform: translateX(0); }
  .row-item .ico {
    width: 28px; height: 28px; border-radius: 7px;
    display: grid; place-items: center; font-size: 13px;
    background: var(--bg-3);
  }
  .row-item .ico.r { background: #241616; color: var(--red); }
  .row-item .ico.y { background: #241f12; color: var(--yellow); }
  .row-item .ico.b { background: #14223a; color: var(--blue); }
  .row-item .ico.g { background: #16241c; color: var(--green); }
  .row-item .ico.p { background: #1f1a2e; color: var(--purple); }
  .row-item .title { font-weight: 500; }
  .row-item .sub { color: var(--fg-dim); font-size: 12.5px; margin-top: 2px; }
  .row-item .sub code { font-family: var(--mono); color: var(--fg); background: var(--bg-3); padding: 0 4px; border-radius: 3px; font-size: 11.5px; }
  .row-item .cta { color: var(--accent); font-size: 12px; opacity: 0; transform: translateX(-4px); transition: 160ms; }

  /* health stats */
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; padding: 12px; }
  .stat {
    background: var(--bg-3); border-radius: 8px; padding: 10px 12px;
    display: flex; flex-direction: column; gap: 4px;
    transition: border-color 160ms; border: 1px solid transparent;
  }
  .stat:hover { border-color: var(--line-2); }
  .stat .lbl { font-size: 10.5px; color: var(--fg-mute); text-transform: uppercase; letter-spacing: 0.06em; }
  .stat .val { font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .stat .val.green { color: var(--green); }
  .stat .val.red { color: var(--red); }
  .stat .val.yellow { color: var(--yellow); }
  .stat svg { display: block; width: 100%; height: 30px; }
  .stat svg path.line { fill: none; stroke: var(--accent); stroke-width: 1.5; }
  .stat svg path.area { fill: var(--accent-soft); }
  .stat svg circle.dot { fill: var(--accent); }
  .stat .delta { font-size: 11px; color: var(--green); }
  .stat .delta.down { color: var(--red); }

  /* concept map */
  .concept { padding: 10px 12px; display: flex; flex-direction: column; gap: 3px; }
  .concept .area {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 10px; border-radius: 6px; cursor: pointer;
    transition: 120ms;
  }
  .concept .area:hover { background: var(--bg-3); transform: translateX(2px); }
  .concept .area .blob { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
  .concept .area .name { font-family: var(--mono); font-size: 12.5px; }
  .concept .area .desc { color: var(--fg-mute); font-size: 11.5px; margin-left: auto; }
  .concept .you {
    margin-top: 6px; padding: 8px 12px; border-radius: 6px;
    border: 1px dashed var(--accent); background: var(--accent-soft);
    font-size: 12px;
  }

  /* questions / open decisions */
  .question-card {
    display: grid; grid-template-columns: 14px 1fr;
    gap: 10px; padding: 10px 14px; cursor: pointer;
    transition: background 160ms;
  }
  .question-card:hover { background: var(--bg-3); }
  .question-card .marker {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--yellow); margin-top: 6px;
    box-shadow: 0 0 0 3px #d6b14a22;
  }
  .question-card.resolved .marker { background: var(--green); box-shadow: 0 0 0 3px #5fb87a22; }
  .question-card .q { font-weight: 500; font-size: 13.5px; }
  .question-card .a { color: var(--fg-dim); font-size: 12.5px; margin-top: 2px; }
  .question-card .meta { color: var(--fg-mute); font-size: 11px; margin-top: 4px; }

  /* schema svg */
  .schema { padding: 0; }
  .schema svg { width: 100%; height: 240px; display: block; }
  .schema rect.entity { fill: var(--bg-3); stroke: var(--line-2); stroke-width: 1; cursor: pointer; transition: stroke 160ms; }
  .schema rect.entity:hover { stroke: var(--accent); }
  .schema text.title { font-family: var(--sans); font-size: 11px; font-weight: 600; fill: var(--accent); }
  .schema text.field { font-family: var(--mono); font-size: 10px; fill: var(--fg-dim); }
  .schema line.rel { stroke: var(--fg-mute); stroke-width: 1; stroke-dasharray: 3 3; }

  /* welcome banner */
  .banner {
    background: linear-gradient(135deg, var(--accent-soft), transparent 60%);
    border: 1px solid #4a3024;
    border-radius: 12px;
    padding: 14px 18px;
    display: grid; grid-template-columns: 1fr auto;
    gap: 14px; align-items: center;
    animation: hero-in 600ms cubic-bezier(.2,.8,.2,1) both;
  }
  .banner .what { font-size: 13.5px; color: var(--fg); line-height: 1.5; }
  .banner .what b { color: var(--fg); }
  .banner .what .delta { color: var(--accent); font-weight: 600; }
  .banner .resume {
    background: var(--accent); color: #fff; border: 0;
    padding: 8px 16px; border-radius: 8px; cursor: pointer;
    font-weight: 600; font-size: 13px;
    box-shadow: 0 4px 12px #d9775744;
  }
  .banner .resume:hover { filter: brightness(1.05); }

  /* composer */
  .input-bar {
    border-top: 1px solid var(--line);
    background: var(--bg-2);
    padding: 12px 20px 14px;
  }
  .input-wrap {
    max-width: 920px; margin: 0 auto;
    display: flex; align-items: center; gap: 8px;
  }
  .quick-bar { display: flex; gap: 6px; }
  .quick-bar button {
    background: var(--bg-3); border: 1px solid var(--line);
    color: var(--fg); padding: 6px 12px; border-radius: 8px;
    font-size: 12.5px; cursor: pointer;
  }
  .quick-bar button:hover { border-color: var(--accent); color: var(--accent); }
  .composer-area {
    flex: 1; background: var(--bg-3); border: 1px solid var(--line-2);
    border-radius: 10px; padding: 8px 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .composer-area:focus-within { border-color: var(--accent); }
  .composer-area textarea {
    flex: 1; background: transparent; border: 0; outline: 0; resize: none;
    color: var(--fg); font-family: var(--sans); font-size: 14px;
    min-height: 22px; max-height: 140px;
  }
  .composer-area .send-btn {
    background: var(--accent); color: #fff; border: 0; border-radius: 6px;
    padding: 5px 12px; font-weight: 600; cursor: pointer;
  }

  /* context menu */
  .ctx-menu {
    position: fixed; z-index: 1000;
    background: var(--bg-2); border: 1px solid var(--line-2); border-radius: 8px;
    padding: 4px; min-width: 240px;
    box-shadow: 0 12px 30px #0009;
    font-size: 13px;
  }
  .ctx-menu button {
    width: 100%; text-align: left; background: none; border: 0; color: var(--fg);
    padding: 7px 10px; border-radius: 5px; cursor: pointer;
    display: flex; align-items: center; gap: 10px;
  }
  .ctx-menu button:hover { background: var(--bg-3); }
  .ctx-menu hr { border: 0; border-top: 1px solid var(--line); margin: 4px 0; }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 1ms !important;
      transition-duration: 1ms !important;
      scroll-behavior: auto !important;
    }
  }
</style>
</head>
<body>

<header>
  <div class="logo">C</div>
  <div>
    <div class="title">claude code</div>
    <div class="crumb"><b>habits/</b> · main · <span style="color: var(--fg-mute);">~/code/habits</span></div>
  </div>
  <div class="spacer"></div>
  <span class="pill green">CI green</span>
  <span class="pill">claude-opus-4-7</span>
  <span class="pill live">live</span>
</header>

<main id="main"><div class="stream" id="stream"></div></main>

<div class="input-bar">
  <div class="input-wrap">
    <div class="composer-area">
      <textarea id="composer" placeholder="Ask about this project, or click a card above to resume a session…" rows="1"></textarea>
      <button class="send-btn" id="send">Ask</button>
    </div>
    <div class="quick-bar">
      <button>Resume yesterday</button>
      <button>Run tests</button>
    </div>
  </div>
</div>

<div class="ctx-menu" id="ctx-menu" style="display:none"></div>

<script>
const $  = (sel, el=document) => el.querySelector(sel);
const $$ = (sel, el=document) => [...el.querySelectorAll(sel)];
const el = (tag, attrs={}, ...children) => {
  const n = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs || {})) {
    if (k === "class") n.className = v;
    else if (k === "html") n.innerHTML = v;
    else if (k.startsWith("on")) n.addEventListener(k.slice(2), v);
    else if (v !== false && v != null) n.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c == null || c === false) continue;
    n.append(c.nodeType ? c : document.createTextNode(c));
  }
  return n;
};
const sleep = ms => new Promise(r => setTimeout(r, ms));

const blocks = new Map();
let nextId = 1;
const newId = (p="c") => `${p}-${nextId++}`;
function register(id, kind, dom, data={}) {
  blocks.set(id, { id, kind, dom, data });
  dom.dataset.blockId = id;
  dom.addEventListener("contextmenu", openCtx);
  return id;
}
function append(node) { $("#stream").append(node); }

function header(icon, kind, name, meta) {
  return el("div", { class: "c-head" },
    el("span", { class: "icon" }, icon),
    el("span", { class: "kind" }, kind),
    el("span", { class: "name" }, name),
    el("span", { class: "meta" }, meta || "")
  );
}

/* ============ components for the project view ============ */

function renderHero() {
  const node = el("div", { class: "hero" },
    el("div", { class: "hero-icon" }, "🔥"),
    el("div", { style: "flex: 1;" },
      el("h1", null, "habits/"),
      el("div", { class: "desc" }, "A habit-tracker web app — daily check-ins, streaks (with grace-day and manual freezes), push notifications, theme picker. Built solo with claude over the last 3 days. Live at ", el("code", { style: "font-family: var(--mono); color: var(--accent);" }, "habits.app"), "."),
      el("div", { class: "stack" },
        el("span", { class: "tag" }, "TypeScript"),
        el("span", { class: "tag" }, "React 18"),
        el("span", { class: "tag" }, "Vite"),
        el("span", { class: "tag" }, "Dexie / IndexedDB"),
        el("span", { class: "tag" }, "vitest"),
        el("span", { class: "tag" }, "Vercel"),
        el("span", { class: "tag" }, "Web Push"),
      )
    )
  );
  append(node);
}

function renderBanner() {
  const node = el("div", { class: "banner" },
    el("div", { class: "what" },
      el("b", null, "Welcome back."),
      " Since you were last here (yesterday, 18:02): ",
      el("span", { class: "delta" }, "11 commits, +1.2k lines, 1 deploy, 1 open question"),
      ". Streak feature is live; analytics events are flowing in. There's ", el("b", null, "1 thing"), " that still wants your attention."
    ),
    el("button", { class: "resume" }, "Resume yesterday →")
  );
  append(node);
}

/* ----- session card ----- */
function renderSessions(name, sessions) {
  const id = newId("ses");
  const list = el("div", { class: "cascade" });
  sessions.forEach(s => {
    list.append(el("div", { class: "session-card " + (s.status || ""),
      onclick: () => alert(`Would open session: ${s.title}`) },
      el("div", { class: "stripe" }),
      el("div", { class: "body" },
        el("div", { class: "title" }, s.title),
        el("div", { class: "summary" }, s.summary),
        el("div", { class: "chips" }, ...s.chips.map(c => el("span", { class: "chip" + (c.accent ? " accent" : "") }, c.text || c))),
      ),
      el("div", { class: "pad" }, s.when),
    ));
  });
  const node = el("div", { class: "component" },
    header("💬", "sessions", name, sessions.length + " sessions"),
    list
  );
  append(node);
  register(id, "sessions", node, { sessions });
  return id;
}

/* ----- in-flight / needs attention ----- */
function renderRowList(icon, kind, name, items) {
  const id = newId(kind);
  const list = el("div", { class: "cascade" });
  items.forEach(it => {
    list.append(el("div", { class: "row-item",
      onclick: () => alert(`Would: ${it.title}`) },
      el("div", { class: "ico " + (it.tone || "b") }, it.glyph || "•"),
      el("div", null,
        el("div", { class: "title" }, it.title),
        el("div", { class: "sub", html: it.sub })
      ),
      el("div", { class: "cta" }, it.cta || "open →"),
    ));
  });
  const node = el("div", { class: "component" },
    header(icon, kind, name, items.length + " items"),
    list
  );
  append(node);
  register(id, kind, node, { items });
  return id;
}

/* ----- stat dashboard ----- */
function renderStats(name, stats) {
  const id = newId("stat");
  const grid = el("div", { class: "stat-grid cascade" });
  stats.forEach(s => {
    const data = s.spark || [];
    const w = 100, h = 30;
    const max = Math.max(...data, 1), min = Math.min(...data, 0);
    const pts = data.map((v, i) => {
      const x = (i / Math.max(data.length - 1, 1)) * w;
      const y = h - ((v - min) / Math.max(max - min, 1)) * (h - 4) - 2;
      return [x, y];
    });
    const lp = pts.map((p, i) => (i ? "L" : "M") + p[0] + "," + p[1]).join(" ");
    const ap = lp + ` L${w},${h} L0,${h} Z`;
    const lx = pts[pts.length - 1]?.[0] || 0, ly = pts[pts.length - 1]?.[1] || 0;
    const svg = `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><path class="area" d="${ap}"/><path class="line" d="${lp}"/><circle class="dot" cx="${lx}" cy="${ly}" r="2.5"/></svg>`;
    grid.append(el("div", { class: "stat" },
      el("div", { class: "lbl" }, s.label),
      el("div", { class: "val " + (s.tone || "") }, s.value),
      s.delta ? el("div", { class: "delta " + (s.delta.startsWith("-") ? "down" : "") }, s.delta) : null,
      s.spark ? el("div", { html: svg }) : null,
    ));
  });
  const node = el("div", { class: "component" },
    header("📊", "health", name, stats.length + " metrics"),
    grid
  );
  append(node);
  register(id, "stats", node, { stats });
  return id;
}

/* ============ context menu ============ */
let menuTarget = null;
function openCtx(ev) {
  ev.preventDefault(); ev.stopPropagation();
  const b = blocks.get(ev.currentTarget.dataset.blockId);
  if (!b) return;
  menuTarget = b;
  const m = $("#ctx-menu");
  m.innerHTML = "";
  [
    { label: "Ask claude about this",  run: () => focusAsk(b) },
    { label: "Resume the related session", run: () => alert("Would resume session") },
    "-",
    { label: "Pin to top",             run: () => alert("Pinned (mock)") },
    { label: "Hide from this view",    run: () => b.dom.style.display = "none" },
  ].forEach(it => {
    if (it === "-") { m.append(el("hr")); return; }
    m.append(el("button", { onclick: () => { it.run(); closeCtx(); } }, it.label));
  });
  m.style.display = "block";
  m.style.left = Math.min(ev.clientX, window.innerWidth - 260) + "px";
  m.style.top  = Math.min(ev.clientY, window.innerHeight - m.offsetHeight - 10) + "px";
}
function closeCtx() { $("#ctx-menu").style.display = "none"; }
document.addEventListener("click", closeCtx);
document.addEventListener("keydown", e => { if (e.key === "Escape") closeCtx(); });
function focusAsk(b) {
  b.dom.classList.add("referenced");
  b.dom.scrollIntoView({ behavior: "smooth", block: "center" });
  setTimeout(() => b.dom.classList.remove("referenced"), 2200);
  const c = $("#composer");
  c.value = `@${b.id} `;
  c.focus();
}

/* composer */
$("#send").addEventListener("click", () => {
  const v = $("#composer").value.trim();
  if (!v) return;
  alert("Would start a new session with: " + v);
});
$("#composer").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); $("#send").click(); }
});
