<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>session progress</title>
<style>
  html, body { height: 100%; margin: 0; }
  body {
    font: 15px/1.5 system-ui, -apple-system, sans-serif;
    color: #555;
    background: #fafafa;
    display: grid;
    place-items: center;
  }
  .card {
    text-align: center;
    padding: 2rem 2.5rem;
    border: 1px dashed #ccc;
    border-radius: 12px;
    background: #fff;
  }
  .dot {
    display: inline-block;
    width: 8px; height: 8px;
    background: #aaa;
    border-radius: 50%;
    margin-right: .5rem;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: .3 } 50% { opacity: 1 } }
  small { color: #999; }
</style>
</head>
<body>
  <div class="card">
    <p><span class="dot"></span>waiting for session activity…</p>
    <small>the watcher will rewrite this page when something happens</small>
  </div>
</body>
</html>
